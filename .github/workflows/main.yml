name: Build Android Bundle

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create build_tmp com.hhbb123hb00.issizcol IssizColSilahsoru
        cd build_tmp
        cordova platform add android
        rm -rf www/*
        cp ../index.html www/
        
    - name: Build Android App Bundle (AAB)
      run: |
        cd build_tmp
        cordova build android --release -- --packageType=bundle

    - name: Upload Android Bundle Artifact
      uses: actions/upload-artifact@v4
      with:
        name: play-store-bundle
        path: build_tmp/platforms/android/app/build/outputs/bundle/release/app-release.aab
