<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issız Çöl Silahşörü - Pro Prototip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #f3e5ab;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(223, 177, 91, 0.3);
            pointer-events: none;
            user-select: none;
            background: rgba(40, 30, 20, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #dfb15b;
        }
        #instructions {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="ui">ŞÖVALYE AVI: <span id="score">0</span></div>
    <div id="instructions">WASD ile Hareket Et | Fare ile Hedef Al ve Sol Tıkla Ateş Et</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        let score = 0;
        const keys = {};
        const bullets = [];
        const enemies = [];
        const particles = [];
        const mouse = { x: 0, y: 0 };

        // 1. GERÇEKÇİ SİLAHŞÖR (OYUNCU)
        const player = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            radius: 22,
            speed: 4.5,
            angle: 0
        };

        // Kontroller
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        window.addEventListener("mousedown", (e) => {
            if (e.button === 0) { 
                shootBullet();
            }
        });

        function shootBullet() {
            // Namlu ucundan çıkma efekti koordinatları
            const muzzleX = player.x + Math.cos(player.angle) * 35;
            const muzzleY = player.y + Math.sin(player.angle) * 35;

            bullets.push({
                x: muzzleX,
                y: muzzleY,
                vx: Math.cos(player.angle) * 12,
                vy: Math.sin(player.angle) * 12,
                radius: 5
            });

            // Ateş etme kıvılcım partikülleri
            for(let i=0; i<5; i++) {
                particles.push({
                    x: muzzleX,
                    y: muzzleY,
                    vx: (Math.cos(player.angle) + (Math.random() - 0.5) * 0.5) * (3 + Math.random() * 3),
                    vy: (Math.sin(player.angle) + (Math.random() - 0.5) * 0.5) * (3 + Math.random() * 3),
                    radius: 2 + Math.random() * 2,
                    color: `rgba(255, ${150 + Math.random() * 105}, 0, 0.8)`,
                    alpha: 1,
                    decay: 0.05
                });
            }
        }

        function createBloodSplatter(x, y) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    radius: 3 + Math.random() * 3,
                    color: 'rgba(139, 0, 0, 0.8)',
                    alpha: 1,
                    decay: 0.03
                });
            }
        }

        // Gerçekçi Düşman Şövalyeler (5 Vuruşta Ölenler)
        function spawnEnemy() {
            if (enemies.length < 10) {
                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? -60 : canvas.width + 60;
                    y = Math.random() * canvas.height;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() < 0.5 ? -60 : canvas.height + 60;
                }

                enemies.push({
                    x: x,
                    y: y,
                    radius: 24,
                    speed: 1.2 + Math.random() * 0.8,
                    hp: 5,
                    maxHp: 5,
                    angle: 0
                });
            }
        }
        setInterval(spawnEnemy, 1200);

        // Ana Oyun Döngüsü
        function gameLoop() {
            // --- GERÇEKÇİ ÇÖL ZEMİNİ ÇİZİMİ ---
            // Temel sıcak çöl rengi
            ctx.fillStyle = "#dca851";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Çöl çatlakları ve rüzgar dalgaları (Estetik Çizgiler)
            ctx.strokeStyle = "#cb963e";
            ctx.lineWidth = 3;
            for (let i = -200; i < canvas.width + 200; i += 180) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.bezierCurveTo(i + 50, canvas.height * 0.3, i - 50, canvas.height * 0.6, i + 20, canvas.height);
                ctx.stroke();
            }

            // Rastgele çöl taşları/tozları
            ctx.fillStyle = "#bd8830";
            for (let i = 0; i < canvas.width; i += 250) {
                ctx.beginPath();
                ctx.arc(i + (i%3)*30, ((i*2)%canvas.height), 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Partikülleri Güncelle ve Çiz (Kıvılcım/Kan)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Oyuncu Hareket Sistemi (WASD)
            if (keys['w']) player.y -= player.speed;
            if (keys['s']) player.y += player.speed;
            if (keys['a']) player.x -= player.speed;
            if (keys['d']) player.x += player.speed;

            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
            if (player.y < player.radius) player.y = player.radius;
            if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;

            player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

            // --- DETAYLI SİLAHŞÖR ÇİZİMİ (Görseldeki Gibi) ---
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);

            // Büyük Gerçekçi Yumuşak Gölge
            ctx.fillStyle = "rgba(40, 25, 10, 0.4)";
            ctx.beginPath();
            ctx.arc(8, 12, player.radius + 4, 0, Math.PI * 2);
            ctx.fill();

            // Kovboy Pelerini / Omuzlar
            ctx.fillStyle = "#3e2a1e"; 
            ctx.beginPath();
            ctx.arc(-5, 0, player.radius + 2, 0, Math.PI * 2);
            ctx.fill();

            // Geniş Kovboy Şapkası Siperliği (Oval Estetik)
            ctx.fillStyle = "#5c4033"; 
            ctx.beginPath();
            ctx.ellipse(0, 0, player.radius + 6, player.radius, 0, 0, Math.PI * 2);
            ctx.fill();

            // Şapkanın Üst Gövdesi ve Siyah Şerit Bandı
            ctx.fillStyle = "#261710";
            ctx.beginPath();
            ctx.arc(0, 0, player.radius * 0.65, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "#111"; // Şapka şeridi
            ctx.beginPath();
            ctx.arc(0, 0, player.radius * 0.55, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#3d2b22";
            ctx.beginPath();
            ctx.arc(0, 0, player.radius * 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Uzatılmış Çift Namlulu Silah
            ctx.fillStyle = "#111111";
            ctx.fillRect(player.radius * 0.4, 5, 22, 5); // Sağ el silahı
            ctx.fillStyle = "#555555";
            ctx.fillRect(player.radius * 0.4 + 2, 6, 20, 2); 

            ctx.restore();

            // Mermileri Güncelle ve Çiz (Parlayan İz Bırakan Mermiler)
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // Mermi Işıltı Efekti
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ffaa00";
                ctx.fillStyle = "#fffdf0";
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // --- DETAYLI ŞÖVALYELERİ GÜNCELLE VE ÇİZ ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];

                let dx = player.x - e.x;
                let dy = player.y - e.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 5) {
                    e.x += (dx / dist) * e.speed;
                    e.y += (dy / dist) * e.speed;
                    e.angle = Math.atan2(dy, dx);
                }

                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.angle);
                
                // Şövalye Devasa Gölgesi
                ctx.fillStyle = "rgba(40, 25, 10, 0.4)";
                ctx.beginPath();
                ctx.arc(6, 10, e.radius + 2, 0, Math.PI * 2);
                ctx.fill();

                // Çelik Ağır Zırh Gövdesi
                ctx.fillStyle = "#8a9597"; 
                ctx.beginPath();
                ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
                ctx.fill();

                // Koyu Çelik Omuzluklar ve Sırt Pelerini
                ctx.fillStyle = "#48494b";
                ctx.fillRect(-18, -16, 12, 32); 
                
                // Şövalye Miğferi Üst Görünümü
                ctx.fillStyle = "#63666a";
                ctx.beginPath();
                ctx.arc(-2, 0, e.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Miğferin Siyah Vizör Çizgisi
                ctx.fillStyle = "#111";
                ctx.fillRect(2, -6, 4, 12);

                // Ellerindeki Büyük Ağır Kalkan (Ön Taraf)
                ctx.fillStyle = "#5c0606"; // Koyu kırmızı kalkan
                ctx.fillRect(14, -14, 6, 28);
                ctx.fillStyle = "#d4af37"; // Altın kalkan kenarlığı
                ctx.strokeRect(14, -14, 6, 28);

                ctx.restore();

                // --- STİLİZE MODERN CAN BARI ÇİZİMİ ---
                let barW = 46;
                let barH = 6;
                // Bar arkası gölge
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(e.x - barW/2, e.y - e.radius - 16, barW, barH);
                // Gerçek can miktarı (5 kademeli)
                ctx.fillStyle = e.hp <= 2 ? "#ff3333" : "#33ff33";
                ctx.fillRect(e.x - barW/2, e.y - e.radius - 16, barW * (e.hp / e.maxHp), barH);
                // Çerçeve
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 1;
                ctx.strokeRect(e.x - barW/2, e.y - e.radius - 16, barW, barH);

                // Mermi ile vurulma kontrolü
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let mDx = b.x - e.x;
                    let mDy = b.y - e.y;
                    let mDist = Math.sqrt(mDx * mDx + mDy * mDy);

                    if (mDist < e.radius + b.radius) {
                        e.hp -= 1; 
                        createBloodSplatter(b.x, b.y); // Kan efekti çıkar
                        bullets.splice(j, 1);

                        if (e.hp <= 0) {
                            enemies.splice(i, 1);
                            score++;
                            scoreEl.innerText = score;
                            break;
                        }
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
